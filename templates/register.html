{% extends "base.html" %}

{% block title %}Register — duumbi registry{% endblock %}

{% block content %}
<div class="auth-card">
    <h1>Create account</h1>

    {% if let Some(err) = error %}
    <div class="alert alert-danger">{{ err }}</div>
    {% endif %}

    <form method="post" action="/register" class="auth-form">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input class="form-input" type="text" id="username" name="username" required autofocus>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" type="password" id="password" name="password" required minlength="8">
            <small class="form-hint">Minimum 8 characters</small>
        </div>
        <div class="form-group">
            <label class="form-label" for="password_confirm">Confirm password</label>
            <input class="form-input" type="password" id="password_confirm" name="password_confirm" required>
        </div>
        <button type="submit" class="btn btn-primary">Register</button>
    </form>
    <p class="auth-alt">Already have an account? <a href="/login">Sign in</a></p>
</div>
{% endblock %}
