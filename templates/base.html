<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}duumbi registry{% endblock %}</title>
    <style>
        {% block inline_css %}{% include "style.css" %}{% endblock %}
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">duumbi<span class="nav-accent">registry</span></a>
        <form class="nav-search" action="/search" method="get">
            <input type="text" name="q" placeholder="Search modules..." value="{{ search_query }}">
            <button type="submit">Search</button>
        </form>
        <div class="nav-links">
            <a href="/publish">Publish</a>
            {% match user %}
            {% when Some with (u) %}
            <div class="nav-user">
                <button class="nav-avatar" aria-label="User menu" onclick="this.parentElement.classList.toggle('open')">
                    {% match u.avatar_url %}
                    {% when Some with (url) %}
                    <img src="{{ url }}" alt="{{ u.username }}" width="28" height="28">
                    {% when None %}
                    <span class="avatar-initials">{{ u.username.chars().next().unwrap_or('U') }}</span>
                    {% endmatch %}
                </button>
                <div class="nav-dropdown">
                    <span class="nav-dropdown-username">@{{ u.username }}</span>
                    <a href="/settings/tokens">API Tokens</a>
                    <form method="post" action="/logout">
                        <button type="submit" class="nav-dropdown-btn">Sign out</button>
                    </form>
                </div>
            </div>
            {% when None %}
            <a href="/login" class="btn btn-login">Sign in</a>
            {% endmatch %}
        </div>
    </nav>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <p>duumbi registry &middot; <a href="https://duumbi.dev">duumbi.dev</a></p>
    </footer>
</body>
</html>
