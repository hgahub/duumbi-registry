<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}duumbi registry{% endblock %}</title>
    <style>
        {% block inline_css %}{% include "style.css" %}{% endblock %}
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">duumbi<span class="nav-accent">registry</span></a>
        <form class="nav-search" action="/search" method="get">
            <input type="text" name="q" placeholder="Search modules..." value="{{ search_query }}">
            <button type="submit">Search</button>
        </form>
        <div class="nav-links">
            <a href="/publish">Publish</a>
        </div>
    </nav>
    <main class="main">
        {% block content %}{% endblock %}
    </main>
    <footer class="footer">
        <p>duumbi registry &middot; <a href="https://duumbi.dev">duumbi.dev</a></p>
    </footer>
</body>
</html>
