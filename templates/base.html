<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}duumbi registry{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        {% block inline_css %}{% include "style.css" %}{% endblock %}
    </style>
</head>
<body>

<!-- NOTEBOOK GRID BACKGROUND -->
<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-grid-major"></div>
  <div class="bg-fade"></div>
  <div class="bg-margin"></div>
  <div class="bg-margin-2"></div>
  <div class="bg-glow"></div>
</div>

<!-- GRAPH DECORATION -->
<div class="graph-deco">
  <div class="gd-ring gd-r1"></div><div class="gd-ring gd-r2"></div>
  <div class="gd-node gd-n1"></div><div class="gd-node gd-n2"></div><div class="gd-node gd-n3"></div><div class="gd-node gd-n4"></div>
  <div class="gd-edge gd-e1"></div><div class="gd-edge gd-e2"></div><div class="gd-edge gd-e3"></div>
  <span class="gd-label gd-l1">:Program</span><span class="gd-label gd-l2">:Scope</span>
</div>

<!-- NAV -->
<nav>
  <div class="nav-l">
    <a class="logo" href="/"><span class="d">duumbi</span><span class="r">registry</span></a>
    <form class="nav-search" action="/search" method="get">
      <input type="text" name="q" placeholder="Search modules..." value="{{ search_query }}">
      <button type="submit">Search</button>
    </form>
  </div>
  <div class="nav-r">
    <a href="/publish" class="nav-link">Publish</a>
    {% match user %}
    {% when Some with (u) %}
    <div class="nav-user">
        <button class="avatar-btn" aria-label="User menu" onclick="this.parentElement.classList.toggle('open')">
            {% match u.avatar_url %}
            {% when Some with (url) %}
            <img src="{{ url }}" alt="{{ u.username }}" width="24" height="24">
            {% when None %}
            <span class="avatar-initials">{{ u.username.chars().next().unwrap_or('U') }}</span>
            {% endmatch %}
        </button>
        <div class="nav-dropdown">
            <span class="nav-dropdown-username">@{{ u.username }}</span>
            <a href="/settings/tokens">API Tokens</a>
            <form method="post" action="/logout">
                <button type="submit" class="nav-dropdown-btn">Sign out</button>
            </form>
        </div>
    </div>
    {% when None %}
    <a href="/login" class="avatar-btn" title="Sign in"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 00-16 0"/></svg></a>
    {% endmatch %}
  </div>
</nav>

<div class="content">
    {% block content %}{% endblock %}
</div>

<footer>duumbi registry &middot; <a href="https://duumbi.dev">duumbi.dev</a></footer>

<script>
document.addEventListener('click',function(e){document.querySelectorAll('.nav-user.open').forEach(function(el){if(!el.contains(e.target))el.classList.remove('open')})});
document.addEventListener('keydown',function(e){if(e.key==='/'&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){e.preventDefault();var s=document.querySelector('.p-search input')||document.querySelector('.nav-search input');if(s)s.focus()}});
</script>
</body>
</html>
